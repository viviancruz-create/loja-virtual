<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Virtual</title>

    <!--Faz seu comentário-->
    <!--Link para adicionar o favicion-->
    <link rel="shortcut icon" href="imagem/logo.jpeg" type="image/x-icon">

    <link rel="stylesheet" href="css/style_estrutura_paginas.css">
    <link rel="stylesheet" href="css/style_formulario.css">

    <!--Link para arquivo-->
</head>
<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                <a href="index.html">
                    <img src="imagem/logo.jpeg" alt="logo">
                </a>

            </div>
            <nav id="menu">
                <ul>
                    <li><a href="index.html" class="lnk_menu">Home</a></li>
                    <li><a href="paginas/cadastro.html" class="lnk_menu">Cadastro</a></li>
                    <li><a href="paginas/sobre.html" class="lnk_menu">Sobre</a></li>
                </ul>
            </nav>

            <div id="div-icones">
                <ul>
                    <li><a href="paginas/login.html" class="lnk_icone"><img src="imagens/icones/login.png" alt=""></a></li>
                    <li><a href="paginas/carrinho.html" class="lnk_icone"><img src="imagens/icones/carrinho.png" alt=""></a></li>
                </ul>
            </div>
        </header>

        <section id="pesquisa">
            <input type="text" name="pesquisa" id="pesquisa" placeholder="Digite seu produto">
        </section>

        <section id="formulario">
            <h3>Cadastro</h3>
            <form id="form-pessoa">
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome" class="input01" required maxlength="60" placeholder="digite seu nome">
                
                <label for="cpf">CPF</label>
                <input type="number" name="cpf" id="cpf" class="input02" required maxlength="14" placeholder="digite seu cpf">

                <label for="data de nascimento">Data de Nascimento</label>
                <input type="number" name="data de nascimento" id="data de nascimento" calss="input02" required>

                <label for="sexo">Sexo</label>
                <input type="radio" name="sexo" id="sexoM" class="inputOp" value="M">Masculino
                <input type="radio" name="sexo" id="sexoF" class="inputOp" value="F">Feminino
                <input type="radio" name="sexo" id="sexoN" class="inputOp" value="N">Não Declarar
                
                <label for="cep">CEP</label>
                <input type="text" name="cep" id="cep" class="input02" required maxlength="9" placeholder="Digite Seu CEP">

                <div id="div-dados-endereco" class="oculto">
                    <label for="logradouro">Logradouro</label>
                    <input type="text" name="logradouro" id="logradouro" class="input01">

                    <label for="num-residencia">Número</label>
                    <input type="text" name="logradouro" id="logradouro" class="input01">

                    <label for="complemento-end">Complemento</label>
                    <input type="text" name="logradouro" id="complemento-end" class="input01">

                    <label for="bairro">Bairro</label>
                    <input type="text" name="bairro" id="bairro" class="input01">

                    <label for="localidade">Localidade</label>
                    <input type="text" name="localidade" id="localidade" class="input01">

                    <label for="uf">UF</label>
                    <input type="text" name="uf" id="uf" class="input02">

                </div>

                
                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" class="input02" required maxlength="6" placeholder="Informe a senha">

                <div id="div-btns">
                   <button type="submit" id="btn-add" >Cadastrar</button>
                   <button type="reset" id="btn-limpar">Limpar</button>
                </div>

            </form>

        </section>

        

        <footer id="rodape">
            <div id="dadosloja">
                <h2>Rua São Domingues,102 - Centro</h2>
                <h1>Carmópolis-Sergipe</h1>
            </div>

            <div id="icones-sociais">
                <ul>
                    <li><a href="https://www.intagram.com/seu_usuario"><img src="imagens/icones/instagram.png" alt=""></a></li>
                    <li><a href="https://www.facebook.com/seu_usuario"><img src="imagens/icones/facebook.png" alt=""></a></li>

                </ul>

            </div>

            <div id="div-cartoes">
                <img src="imagem/icones/hipercard.png" alt="hipercard">
                <img src="imagem/icones/visa.png" alt="Visa">
                <img src="imagem/icones/master_card.png" alt="Mastercard">

            </div>
        </footer>

        
    </main>
</body>
</html>
