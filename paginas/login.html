<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login da Loja</title>

    <link rel="stylesheet" href="../css/style _login_paginas.css">

    <link rel="shortcut icon" href="../imagem/logo.jpeg" type="image/x-icon">
    

</head>
<body>
    <div id="geral">

        <header id="cabecalho">
            <div id="logo">
                <img src="../imagem/logo.jpeg" alt="Logo da Loja">
            </div>
            <nav id="menu">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Produtos</a></li>
                    <li><a href="#">Contato</a></li>
                </ul>
            </nav>
        </header>

        <section class="login-section">
            <div class="login-header">
                <h1>Entrar</h1>
                <p>Acesse sua conta na lojinha</p>
            </div>

            <form action="/login" method="POST">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Sua senha" required>
                </div>

                <div class="forgot-password">
                    <a href="#">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-login">Acessar Conta</button>
            </form>

            <div class="footer-links">
                Ainda não tem conta? <a href="#">Cadastre-se</a>
            </div>
        </section>

        <footer id="rodape">
            <div id="dadosloja">
                <p>&copy; 2026 Minha Lojinha Virtual. Todos os direitos reservados.</p>
            </div>
            <div id="icones-sociais">
                </div>
        </footer>

     </div>
    
</body>
</html>
