<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>

    <link rel="shortcut icon" href="../imagem/logo.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="../css/style_carrinho_paginas.css">
    <script type="module" src="../js/monta_tela_carrinho.js" defer></script>
</head>

<body>

    <header>
        <h1>VS Cake Delícia</h1>
    </header>

    <nav>
        <a href="../index.html">Loja</a> | <a href="../paginas/sobre.html">Quem Somos</a> | <a
            href="../paginas/cadastro.html">Cadastro</a> | <a href="../paginas/login.html">Login</a>
    </nav>

    <div class="container">
        <div class="page-title">Carrinho de Compras</div>

        <div class="main-layout">

            <div class="products-column">

                <div class="card">
                    <img src="imagem/donuts.jpg" alt="donuts" class="img_card">
                    <h2 class="tito_card">Donuts</h2>
                    <h3 class="valor_card">R$8,00</h3>
                    <button class="btn_card">Adicionar</button>
                </div>
    
                <div class="card">
                    <img src="imagem/doce .jpg" alt="donuts" class="img_card">
                    <h2 class="tito_card">Browine no pote</h2>
                    <h3 class="valor_card">R$12,00</h3>
                    <button class="btn_card">Adicionar</button>
                </div>
    
                <div class="card">
                    <img src="imagem/bolo de brigadeiro.jpg" alt="donuts" class="img_card">
                    <h2 class="tito_card">Bolo de Brigadeiro</h2>
                    <h3 class="valor_card">R$35,00</h3>
                    <button class="btn_card">Adicionar</button>
                </div>
    
                <div class="card">
                    <img src="imagem/bolo de morango.jpg" alt="donuts" class="img_card">
                    <h2 class="tito_card">Bolo de Morango</h2>
                    <h3 class="valor_card">R$40,00</h3>
                    <button class="btn_card">Adicionar</button>
                </div>
    
                <div class="card">
                    <img src="imagem/macarons.jpg" alt="donuts" class="img_card">
                    <h2 class="tito_card">10 Macarons -</h2>
                    <h3 class="valor_card">R$55,00</h3>
                    <button class="btn_card">Adicionar</button>
                </div>
    
                <div class="card">
                    <img src="imagem/pote da felicidade.jpeg" alt="donuts" class="img_card">
                    <h2 class="tito_card">Pote da felicidade</h2>
                    <h3 class="valor_card">R$15,00</h3>
                    <button class="btn_card">Adicionar</button>
                   
            </div>

            <form id="CEP">

                <div class="checkout-column">
                    <div class="form-group">
                        <label for="cep">CEP</label>
                        <input type="text" id="cep" class="form-control" placeholder="Ex: 49000-000">
                    </div>

                    <div class="summary-row">
                        <div class="summary-label">Valor Total</div>
                        <div id="valor-total"></div>
                    </div>

                    <div class="summary-row">
                        <div class="summary-label">Valor Frete</div>
                        <div id="valor-frete"></div>
                    </div>

                    <div class="summary-row total">
                        <div class="summary-label">Total a Pagar</div>
                        <div id="total-a-pagar"></div>
                    </div>

                    <a href="#" class="btn btn-continue">Continuar Compras</a>
                    <a href="#" class="btn btn-finish">Finalizar Compra</a>
                </div>

        </div>

</body>

</html>
